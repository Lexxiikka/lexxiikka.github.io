<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Имени шизы Лексики</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Underdog&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Underdog', 'Calibri';
        }

        .home-theme #profile-block,
        .home-theme #skills-block {
            border-color: #8e92c6;
        }

        .profile-container::after {
            background: radial-gradient(circle at 10px 10px,
                    var(--primary-color, #b700ff) 23%,
                    transparent 15%);
        }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        .controls {
            position: fixed;
            bottom: calc(50% - 240px - 10px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .theme-button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: bold;
        }

        .theme-button:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            color: white;
        }

        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        .transparency-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transparency-icon {
            width: 20px;
            height: 20px;
            color: white;
        }

        .top-controls {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #profile-block {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 820px;
            min-height: 332px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
            pointer-events: auto;
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .profile-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .profile-container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;

            animation: orbit 3s linear infinite;
            z-index: -1;
            filter: blur(7px);
            box-shadow: none;
        }

        .profile-container.fast-orbit::after {
            animation: fast-orbit 0.5s linear forwards;
        }

        .profile-picture {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            pointer-events: auto;
            opacity: 1 !important;
        }

        .profile-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .name-and-badges {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
            margin-bottom: 10px;
        }

        #profile-name {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
            opacity: 1 !important;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge-container {
            position: relative;
            pointer-events: auto;
            opacity: 1 !important;
        }

        .badge-container .tooltip {
            visibility: hidden;
            width: 120px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .badge-container:hover .tooltip {
            visibility: visible;
            opacity: 1 !important;
        }

        .badge-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 2px;
            border-radius: 15px;
            display: inline-block;
        }

        .badge-box-inner {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 12px;
            display: flex;
            gap: 8px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .badge {
            width: 22px;
            height: 22px;
            transition: transform 0.3s;
            pointer-events: auto;
            opacity: 1 !important;
        }

        .badge:hover {
            transform: scale(1.2);
        }

        #profile-bio {
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 10px;
            opacity: 1 !important;
        }

        .bio-separator {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
            opacity: 1 !important;
        }

        .profile-footer {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            margin-top: auto;
        }

        .visitor-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            align-self: flex-start;
            position: relative;
            pointer-events: auto;
            opacity: 1 !important;
            width: 110px;
        }

        .visitor-icon {
            width: 18px;
            height: 18px;
            color: white;
            opacity: 1 !important;
        }

        .visitor-counter .tooltip {
            visibility: hidden;
            width: 130px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            position: absolute;
            z-index: 100;
            top: -35px;
            left: 50%;
            margin-left: -63px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visitor-counter:hover .tooltip {
            visibility: visible;
            opacity: 1 !important;
        }

        #visitor-count {
            opacity: 1 !important;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 0;
            pointer-events: auto;
            opacity: 1 !important;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
            pointer-events: auto;
            opacity: 1 !important;
        }

        .social-icon:hover {
            transform: scale(1.4) rotateY(15deg);
        }

        #skills-block {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 820px;
            min-height: 332px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
        }

        .skills-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .skill {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .skill-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-icon {
            width: 22px;
            height: 22px;
            margin-right: 8px;
        }

        .skill-barrcontainer {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .skill-bar {
            height: 100%;
            border-radius: 5px;
            width: 0%;
            transition: width 2s;
        }

        #barr1 {
            background: linear-gradient(90deg, #097200, #00ff00);
        }

        #barr2 {
            background: linear-gradient(90deg, #00eeff, #006efe);
        }

        #barr3 {
            background: linear-gradient(90deg, #ffc343, #ffe600);
        }

        #barr4 {
            background: linear-gradient(90deg, #800000, #ff0000);
        }

        #barr5 {
            background: linear-gradient(90deg, #550077, #a200ff);
        }

        #results-button-container {
            position: fixed;
            top: 90%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        #results-theme {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        #results-theme:hover {
            background: rgba(0, 0, 0, 0.9);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .glitch {
            animation: glitch 0.2s ease-in-out;
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(-2px, -2px);
            }

            60% {
                transform: translate(2px, 2px);
            }

            80% {
                transform: translate(2px, -2px);
            }

            100% {
                transform: translate(0);
            }
        }

        @keyframes orbit {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fast-orbit {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .cursor-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        .cursor-trail-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            cursor: pointer;
        }

        #start-text {
            font-size: 24px;
            color: #fff;
            text-align: center;
        }

        #results-theme {
            transition: opacity 1s ease;
            opacity: 1;
        }

        @media (max-width: 430px) {

            #profile-block,
            #skills-block {
                width: 90vw;
                max-width: 350px;
                min-height: 280px;
                padding: 15px;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .profile-container {
                width: 120px;
                height: 120px;
            }

            .profile-picture {
                width: 200px;
                height: 200px;
            }

            .profile-info {
                align-items: center;
                text-align: center;
            }

            .name-and-badges {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }

            #profile-name {
                font-size: 24px;
                letter-spacing: 2px;
            }

            .badge-group {
                justify-content: center;
                gap: 6px;
            }

            .badge {
                width: 18px;
                height: 18px;
            }

            .badge-container .tooltip {
                width: 100px;
                font-size: 12px;
                margin-left: -50px;
                bottom: 110%;
            }

            #profile-bio {
                font-size: 14px;
                line-height: 1.4;
            }

            .bio-separator {
                margin: 15px 0;
            }

            .social-links {
                gap: 10px;
                justify-content: center;
            }

            .social-icon {
                width: 32px;
                height: 32px;
            }

            .visitor-counter {
                font-size: 12px;
                padding: 6px 12px;
                align-self: center;
            }

            .visitor-icon {
                width: 16px;
                height: 16px;
            }

            .visitor-counter .tooltip {
                width: 100px;
                font-size: 12px;
                margin-left: -50px;
                top: -30px;
            }

            .skills-title {
                font-size: 18px;
                margin-bottom: 10px;
            }

            .skill-icon {
                width: 18px;
                height: 18px;
            }

            .skill-name span {
                font-size: 14px;
            }

            .controls {
                bottom: 20px;
                gap: 8px;
                padding: 5px 8px;
            }

            .theme-button {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .top-controls {
                bottom: 70px;
                gap: 10px;
                padding: 6px 10px;
            }

            .volume-control,
            .transparency-control {
                gap: 6px;
            }

            .volume-icon,
            .transparency-icon {
                width: 18px;
                height: 18px;
            }

            .slider {
                width: 60px;
                height: 4px;
            }

            .slider::-webkit-slider-thumb {
                width: 10px;
                height: 10px;
            }

            #results-button-container {
                top: 10px;
            }

            #results-theme {
                padding: 6px 12px;
                font-size: 12px;
            }

            #start-text {
                font-size: 18px;
                padding: 0 20px;
            }
        }
    </style>
</head>

    <script>
        let hasUserInteracted = false;
        let assetsLoaded = false;
        let totalAssets = 0;
        let loadedAssets = 0;
        function initMedia() {
            console.log("initMedia called");
            const backgroundMusic = document.getElementById('background-music');
            backgroundMusic.src = `assets/music.mp3`;
            if (!backgroundMusic) {
                console.error("Media elements not found");
                return;
            }
            backgroundMusic.volume = 0.3;
        }
        function trackAssetLoad() {
            loadedAssets++;
            const loadingPercent = Math.floor((loadedAssets / totalAssets) * 100);
            const startText = document.getElementById('start-text');
            if (startText && !assetsLoaded) {
                startText.textContent = `Идет подгрузка контента страницы ${loadingPercent}%`;
            }
            if (loadedAssets >= totalAssets) {
                assetsLoaded = true;
                runStartScreenEffect();
            }
        }
        function preloadAssets() {
            const assetsToLoad = [
                'assets/background.mp4',
                'assets/music.mp3',
                'assets/profile.png',
                'assets/py.png',
                'assets/js.png',
                'assets/developer.png',
                'assets/owner.gif',
                'assets/aal.png',
                'assets/staff.gif',
                'assets/telegram.png',
                'assets/telergam_group.png',
                'assets/discord.png',
                'assets/youtube.png',
                'assets/steam.png'
            ];
            totalAssets = assetsToLoad.length;
            assetsToLoad.forEach(src => {
                if (src.endsWith('.mp4')) {
                    const video = document.createElement('video');
                    video.preload = 'auto';
                    video.src = src;
                    video.onloadeddata = trackAssetLoad;
                    video.onerror = trackAssetLoad;
                } else if (src.endsWith('.mp3')) {
                    const audio = document.createElement('audio');
                    audio.preload = 'auto';
                    audio.src = src;
                    audio.onloadeddata = trackAssetLoad;
                    audio.onerror = trackAssetLoad;
                } else {
                    const img = new Image();
                    img.src = src;
                    img.onload = trackAssetLoad;
                    img.onerror = trackAssetLoad;
                }
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            const startScreen = document.getElementById('start-screen');
            const startText = document.getElementById('start-text');
            const profileName = document.getElementById('profile-name');
            const profileBio = document.getElementById('profile-bio');
            const visitorCount = document.getElementById('visitor-count');
            const backgroundMusic = document.getElementById('background-music');
            const resultsButton = document.getElementById('results-theme');
            const volumeIcon = document.getElementById('volume-icon');
            const volumeSlider = document.getElementById('volume-slider');
            const glitchOverlay = document.querySelector('.glitch-overlay');
            const profileBlock = document.getElementById('profile-block');
            const skillsBlock = document.getElementById('skills-block');
            const bar1el = document.getElementById('barr1');
            const bar2el = document.getElementById('barr2');
            const bar3el = document.getElementById('barr3');
            const bar4el = document.getElementById('barr4');
            const bar5el = document.getElementById('barr5');
            const profilePicture = document.querySelector('.profile-picture');
            const profileContainer = document.querySelector('.profile-container');
            preloadAssets();
            let startTextContent = '';
            let startIndex = 0;
            let startCursorVisible = true;
            let typeWriterInterval;
            let typewriterComplete = false;
            function runStartScreenEffect() {
                const finalMessage = "Ну же, один клик во имя повелителя. . .";
                if (!assetsLoaded) {
                    typeWriterInterval = setTimeout(runStartScreenEffect, 100);
                } else if (!typewriterComplete) {
                    if (startIndex <= finalMessage.length) {
                        startTextContent = finalMessage.slice(0, startIndex);
                        startText.textContent = startTextContent + (startCursorVisible ? '|' : ' ');
                        if (startIndex < finalMessage.length) {
                            startIndex++;
                        }
                        typeWriterInterval = setTimeout(runStartScreenEffect, 100);
                    } else {
                        typewriterComplete = true;
                        setInterval(() => {
                            startCursorVisible = !startCursorVisible;
                            startText.textContent = startTextContent + (startCursorVisible ? '|' : ' ');
                        }, 500);
                    }
                }
            }
            runStartScreenEffect();
            startScreen.addEventListener('click', () => {
                if (!assetsLoaded) {
                    return;
                }
                clearTimeout(typeWriterInterval);
                startScreen.classList.add('hidden');
                backgroundMusic.muted = false;
                backgroundMusic.play().catch(err => {
                    console.error("Failed to play music after start screen click:", err);
                });
                profileBlock.classList.remove('hidden');
                gsap.fromTo(profileBlock,
                    { opacity: 0, y: -50 },
                    {
                        opacity: 1, y: 0, duration: 1, ease: 'power2.out', onComplete: () => {
                            profileBlock.classList.add('profile-appear');
                            profileContainer.classList.add('orbit');
                        }
                    }
                );
                typeWriterName();
                typeWriterBio();
            });
            startScreen.addEventListener('touchstart', (e) => {
                if (!assetsLoaded || !typewriterComplete) {
                    e.preventDefault();
                    return;
                }
                startScreen.classList.add('hidden');
                backgroundMusic.muted = false;
                backgroundMusic.play().catch(err => {
                    console.error("Failed to play music after start screen touch:", err);
                });
                profileBlock.classList.remove('hidden');
                gsap.fromTo(profileBlock,
                    { opacity: 0, y: -50 },
                    {
                        opacity: 1, y: 0, duration: 1, ease: 'power2.out', onComplete: () => {
                            profileBlock.classList.add('profile-appear');
                            profileContainer.classList.add('orbit');
                        }
                    }
                );
                typeWriterName();
                typeWriterBio();
            });
            function initializeVisitorCounter() {
                totalVisitors = Math.floor(Math.random() * 900000) + 100000;
                visitorCount.textContent = totalVisitors.toLocaleString();
            }
            initializeVisitorCounter();
            setInterval(initializeVisitorCounter, 10);
            function AnimatedText(elem, text) {
                elem.style.opacity = 0;
                setTimeout(() => {
                    elem.innerText = text;
                    elem.style.opacity = 1;
                }, 1000);
            }
            const names = [
                "👾 Мизеро ",
                "✨ Lexxikka ",
                "⚰️ Агнец ",
                "💬 Potentate ",
                "👑 Lex ",
                "🛠️ HazHot ",
            ];
            const bioMessages = [
                "С чего бы начать?",
                "Старая тема была лучше. . .",
                "Человек, что посвятил себя ГШ, но оказался там не нужен, а С8 перестал быть местом, где можно с радостью провести время. Далее - просто погрещность, что видят ваши глаза. . .",
                "Лучший работник планеты © FICSIT",
                "Первый увидивший это творение - мой брат по несчастью",
                //"Музыка: Molly Moon - Просто забей",
                "Третьего сезона MineLovely не будет",
                "git push *megre error* git push --force",
                "Спасибо господь, что я такой a*уенный",
                "github unban me pls",
                "Я добрый человек, не с кем не хочу ссориться, так что если я был с вами груб или резок, поработайте над собой, и мне не придется вести себя так снова",
                "4 за столь сложный экзамен это круто! И это я о тебе, у меня 5",
                "Почему я не доверяю собакам? Потому что они издают lie",
                "Зачем ты это читаешь?",
                "Если вы везде в блоке и хотите извиниться пишите на почту: cojepp3y@dzet.su",
                "Ну я хз что сюда ещё писать",
                "Проблемы с изображениями - очистите кеш браузера",
            ];
            let currentNameIndex = 0;
            let name = names[currentNameIndex];
            let nameText = '';
            let nameIndex = 0;
            let isNameDeleting = false;
            let nameCursorVisible = true;
            function typeWriterName() {
                if (!isNameDeleting && nameIndex < name.length) {
                    nameText = name.slice(0, nameIndex + 1);
                    nameIndex++;
                } else if (isNameDeleting && nameIndex > 0) {
                    nameText = name.slice(0, nameIndex - 1);
                    nameIndex--;
                } else if (nameIndex === name.length) {
                    isNameDeleting = true;
                    setTimeout(typeWriterName, 2000);
                    return;
                } else if (nameIndex === 0) {
                    isNameDeleting = false;
                    currentNameIndex = (currentNameIndex + 1) % names.length;
                    name = names[currentNameIndex];
                }
                profileName.textContent = nameText + (nameCursorVisible ? '|' : ' ');
                if (Math.random() < 0.1) {
                    profileName.classList.add('glitch');
                    setTimeout(() => profileName.classList.remove('glitch'), 200);
                }
                setTimeout(typeWriterName, isNameDeleting ? 50 : Math.floor(Math.random() * 101) + 30);
            }
            setInterval(() => {
                nameCursorVisible = !nameCursorVisible;
                profileName.textContent = nameText + (nameCursorVisible ? '|' : ' ');
            }, 500);
            let bioText = '';
            let bioIndex = 0;
            let bioMessageIndex = 0;
            let isBioDeleting = false;
            let bioCursorVisible = true;
            function typeWriterBio() {
                if (!isBioDeleting && bioIndex < bioMessages[bioMessageIndex].length) {
                    bioText = bioMessages[bioMessageIndex].slice(0, bioIndex + 1);
                    bioIndex++;
                } else if (isBioDeleting && bioIndex > 0) {
                    bioText = bioMessages[bioMessageIndex].slice(0, bioIndex - 1);
                    bioIndex--;
                } else if (bioIndex === bioMessages[bioMessageIndex].length) {
                    isBioDeleting = true;
                    setTimeout(typeWriterBio, 2000);
                    return;
                } else if (bioIndex === 0 && isBioDeleting) {
                    isBioDeleting = false;
                    bioMessageIndex = (bioMessageIndex + 1) % bioMessages.length;
                }
                profileBio.textContent = bioText + (bioCursorVisible ? '|' : ' ');
                if (Math.random() < 0.1) {
                    profileBio.classList.add('glitch');
                    setTimeout(() => profileBio.classList.remove('glitch'), 200);
                }
                setTimeout(typeWriterBio, isBioDeleting ? 20 : Math.floor(Math.random() * 101) + 30);
            }
            setInterval(() => {
                bioCursorVisible = !bioCursorVisible;
                profileBio.textContent = bioText + (bioCursorVisible ? '|' : ' ');
            }, 500);
            let currentAudio = backgroundMusic;
            let isMuted = false;
            volumeIcon.addEventListener('click', () => {
                isMuted = !isMuted;
                currentAudio.muted = isMuted;
                volumeIcon.innerHTML = isMuted
                    ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>`
                    : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>`;
            });
            volumeIcon.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isMuted = !isMuted;
                currentAudio.muted = isMuted;
                volumeIcon.innerHTML = isMuted
                    ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path>`
                    : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>`;
            });
            volumeSlider.addEventListener('input', () => {
                currentAudio.volume = volumeSlider.value;
                isMuted = false;
                currentAudio.muted = false;
                volumeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>`;
            });
            function handleTilt(e, element) {
                const rect = element.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const mouseX = clientX - centerX;
                const mouseY = clientY - centerY;
                const maxTilt = 15;
                const tiltX = (mouseY / rect.height) * maxTilt;
                const tiltY = -(mouseX / rect.width) * maxTilt;
                gsap.to(element, {
                    rotationX: tiltX,
                    rotationY: tiltY,
                    duration: 0.3,
                    ease: 'power2.out',
                    transformPerspective: 1000
                });
            }
            profileBlock.addEventListener('mousemove', (e) => handleTilt(e, profileBlock));
            profileBlock.addEventListener('touchmove', (e) => {
                e.preventDefault();
                handleTilt(e, profileBlock);
            });
            skillsBlock.addEventListener('mousemove', (e) => handleTilt(e, skillsBlock));
            skillsBlock.addEventListener('touchmove', (e) => {
                e.preventDefault();
                handleTilt(e, skillsBlock);
            });
            profileBlock.addEventListener('mouseleave', () => {
                gsap.to(profileBlock, {
                    rotationX: 0,
                    rotationY: 0,
                    duration: 0.5,
                    ease: 'power2.out'
                });
            });
            profileBlock.addEventListener('touchend', () => {
                gsap.to(profileBlock, {
                    rotationX: 0,
                    rotationY: 0,
                    duration: 0.5,
                    ease: 'power2.out'
                });
            });
            skillsBlock.addEventListener('mouseleave', () => {
                gsap.to(skillsBlock, {
                    rotationX: 0,
                    rotationY: 0,
                    duration: 0.5,
                    ease: 'power2.out'
                });
            });
            skillsBlock.addEventListener('touchend', () => {
                gsap.to(skillsBlock, {
                    rotationX: 0,
                    rotationY: 0,
                    duration: 0.5,
                    ease: 'power2.out'
                });
            });
            profilePicture.addEventListener('click', () => {
                profileContainer.classList.remove('fast-orbit');
                profileContainer.classList.remove('orbit');
                void profileContainer.offsetWidth;
                profileContainer.classList.add('fast-orbit');
                setTimeout(() => {
                    profileContainer.classList.remove('fast-orbit');
                    void profileContainer.offsetWidth;
                    profileContainer.classList.add('orbit');
                }, 500);
            });
            profilePicture.addEventListener('touchstart', (e) => {
                e.preventDefault();
                profileContainer.classList.remove('fast-orbit');
                profileContainer.classList.remove('orbit');
                void profileContainer.offsetWidth;
                profileContainer.classList.add('fast-orbit');
                setTimeout(() => {
                    profileContainer.classList.remove('fast-orbit');
                    void profileContainer.offsetWidth;
                    profileContainer.classList.add('orbit');
                }, 500);
            });
            let isShowingSkills = false;
            resultsButton.addEventListener('click', () => {
                if (!isShowingSkills) {
                    AnimatedText(resultsButton, "Нажми чтобы вернуться")
                    gsap.to(profileBlock, {
                        x: -100,
                        opacity: 0,
                        duration: 0.5,
                        ease: 'power2.in',
                        onComplete: () => {
                            profileBlock.classList.add('hidden');
                            skillsBlock.classList.remove('hidden');
                            gsap.fromTo(skillsBlock,
                                { x: 100, opacity: 0 },
                                { x: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }
                            );
                            gsap.to(bar1el, { width: '94%', duration: 5, ease: 'power2.out' });
                            gsap.to(bar2el, { width: '33%', duration: 1, ease: 'power2.out' });
                            gsap.to(bar3el, { width: '14%', duration: 4, ease: 'power2.out' });
                            gsap.to(bar4el, { width: '68%', duration: 3, ease: 'power2.out' });
                            gsap.to(bar5el, { width: '41%', duration: 2, ease: 'power2.out' });
                        }
                    });
                    isShowingSkills = true;
                } else {
                    AnimatedText(resultsButton, "Жизненные показатели")
                    gsap.to(skillsBlock, {
                        x: 100,
                        opacity: 0,
                        duration: 0.5,
                        ease: 'power2.in',
                        onComplete: () => {
                            skillsBlock.classList.add('hidden');
                            profileBlock.classList.remove('hidden');
                            gsap.fromTo(profileBlock,
                                { x: -100, opacity: 0 },
                                { x: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }
                            );
                        }
                    });
                    isShowingSkills = false;
                }
            });
            resultsButton.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!isShowingSkills) {
                    gsap.to(profileBlock, {
                        x: -100,
                        opacity: 0,
                        duration: 0.5,
                        ease: 'power2.in',
                        onComplete: () => {
                            profileBlock.classList.add('hidden');
                            skillsBlock.classList.remove('hidden');
                            gsap.fromTo(skillsBlock,
                                { x: 100, opacity: 0 },
                                { x: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }
                            );
                        }
                    });
                    isShowingSkills = true;
                } else {
                    gsap.to(skillsBlock, {
                        x: 100,
                        opacity: 0,
                        duration: 0.5,
                        ease: 'power2.in',
                        onComplete: () => {
                            skillsBlock.classList.add('hidden');
                            profileBlock.classList.remove('hidden');
                            gsap.fromTo(profileBlock,
                                { x: -100, opacity: 0 },
                                { x: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }
                            );
                        }
                    });
                    isShowingSkills = false;
                }
            });
        });
